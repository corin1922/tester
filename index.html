<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kamus Bahasa Indonesia">
<meta name="theme-color" content="#ffffff">
<title>Kamus Bahasa Indonesia</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/tester/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="/tester/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/tester/icon-192.png">
<style>
  :root {
    --red: #e8385a;
    --red-light: #fff0f2;
    --purple: #7c5cbf;
    --purple-light: #f3f0fa;
    --blue: #4a6cf7;
    --blue-light: #f0f4ff;
    --green: #2da86a;
    --green-light: #f0faf4;
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #ececec;
    --text: #222222;
    --text2: #888888;
    --text3: #bbbbbb;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }
  .header { background: var(--card); border-bottom: 0.5px solid var(--border); padding: calc(12px + var(--safe-top)) 16px 10px; flex-shrink: 0; }
  .app-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 10px; }
  .app-title span { color: var(--red); }
  .content-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .nav-bar { background: var(--card); border-top: 0.5px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); flex-shrink: 0; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; font-size: 10px; color: var(--text3); cursor: pointer; border: none; background: none; }
  .nav-item.active { color: var(--red); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* ── Search ── */
  .search-bar { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 9px 12px; }
  .search-bar.focused { border-color: var(--red); }
  .search-bar input { flex: 1; border: none; background: none; font-size: 15px; color: var(--text); outline: none; }
  .search-bar input::placeholder { color: var(--text3); font-size: 14px; }
  .search-clear { background: none; border: none; color: var(--text3); font-size: 18px; padding: 0 2px; cursor: pointer; line-height: 1; }
  .filter-row { display: flex; gap: 6px; margin-top: 8px; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--red); color: white; border-color: var(--red); }

  /* ── Cards ── */
  .section-label { font-size: 11px; color: var(--text3); padding: 14px 16px 6px; letter-spacing: 0.4px; text-transform: uppercase; }
  .word-card { margin: 0 12px 6px; background: var(--card); border-radius: 12px; padding: 11px 14px; border: 0.5px solid var(--border); cursor: pointer; transition: opacity 0.1s; }
  .word-card:active { opacity: 0.7; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-main { flex: 1; min-width: 0; }
  .word-ind { font-size: 16px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .word-ko { font-size: 12px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .word-en { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .src-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; margin-bottom: 4px; display: inline-block; }
  .src-id { background: var(--red-light); color: var(--red); }
  .src-ko { background: var(--blue-light); color: var(--blue); }
  .src-en { background: var(--green-light); color: var(--green); }
  .src-custom { background: var(--purple-light); color: var(--purple); }
  .star-btn { background: none; border: none; font-size: 18px; padding: 0 0 0 8px; cursor: pointer; flex-shrink: 0; line-height: 1; }
  .highlight { color: var(--red); font-weight: 600; }
  .group-label { font-size: 11px; color: var(--text3); padding: 10px 16px 4px; }
  .empty-msg { text-align: center; color: var(--text3); font-size: 14px; padding: 40px 20px; line-height: 1.8; }

  /* ── Detail View ── */
  #detail-view { display: none; flex-direction: column; height: 100%; }
  .detail-header { background: var(--card); border-bottom: 0.5px solid var(--border); padding: calc(12px + var(--safe-top)) 16px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .back-btn { background: none; border: none; font-size: 22px; color: var(--red); cursor: pointer; padding: 0; line-height: 1; }
  .detail-header-title { flex: 1; font-size: 17px; font-weight: 500; }
  .detail-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
  .detail-card { background: var(--card); border-radius: 14px; padding: 16px; border: 0.5px solid var(--border); margin-bottom: 10px; }
  .detail-word { font-size: 26px; font-weight: 600; color: var(--text); }
  .detail-root { font-size: 12px; color: var(--purple); margin-top: 4px; }
  .detail-divider { height: 0.5px; background: var(--border); margin: 12px 0; }
  .detail-ko { font-size: 16px; color: var(--text); line-height: 1.7; }
  .detail-en { font-size: 13px; color: var(--text2); margin-top: 8px; }
  .detail-actions { display: flex; gap: 8px; margin-top: 14px; }
  .action-btn { flex: 1; padding: 9px; border-radius: 10px; border: 0.5px solid var(--border); background: var(--bg); font-size: 13px; color: var(--text2); text-align: center; cursor: pointer; transition: opacity 0.1s; }
  .action-btn:active { opacity: 0.7; }
  .action-btn.primary { background: var(--red); color: white; border-color: transparent; }
  .action-btn.danger { background: #fff0f2; color: var(--red); border-color: var(--border); }

  /* ── Edit/Add Form ── */
  #edit-view { display: none; flex-direction: column; height: 100%; }
  .form-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--card); color: var(--text); outline: none; }
  .form-input:focus { border-color: var(--red); }
  .form-submit { width: 100%; padding: 13px; background: var(--red); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 8px; }

  /* ── Favorites & Wordbook tabs ── */
  .tab-bar { display: flex; border-bottom: 0.5px solid var(--border); background: var(--card); }
  .tab-btn { flex: 1; padding: 10px; font-size: 13px; border: none; background: none; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--red); border-bottom-color: var(--red); }

  /* ── Settings ── */
  .settings-section { margin: 12px; }
  .settings-card { background: var(--card); border-radius: 12px; border: 0.5px solid var(--border); overflow: hidden; }
  .settings-row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .settings-row:last-child { border-bottom: none; }
  .settings-row:active { background: var(--bg); }
  .settings-icon { font-size: 20px; margin-right: 12px; }
  .settings-label { flex: 1; font-size: 15px; color: var(--text); }
  .settings-arrow { color: var(--text3); font-size: 14px; }
  .settings-title { font-size: 12px; color: var(--text3); padding: 16px 16px 6px; text-transform: uppercase; letter-spacing: 0.4px; }

  /* ── Wordbook ── */
  .wordbook-card { margin: 0 12px 6px; background: var(--card); border-radius: 12px; padding: 13px 14px; border: 0.5px solid var(--border); display: flex; align-items: center; cursor: pointer; }
  .wordbook-card:active { opacity: 0.7; }
  .wordbook-icon { font-size: 22px; margin-right: 12px; }
  .wordbook-info { flex: 1; }
  .wordbook-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .wordbook-count { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .add-wordbook-btn { margin: 6px 12px; background: var(--card); border: 1px dashed var(--border); border-radius: 12px; padding: 13px; text-align: center; font-size: 14px; color: var(--text3); cursor: pointer; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; }
  .modal-sheet { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .modal-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; margin-bottom: 10px; outline: none; }
  .modal-input:focus { border-color: var(--red); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 11px; border-radius: 10px; border: 0.5px solid var(--border); background: var(--bg); font-size: 14px; cursor: pointer; }
  .modal-btn.primary { background: var(--red); color: white; border-color: transparent; }
</style>
</head>
<body>
<div id="app">
  <!-- ── MAIN VIEW ── -->
  <div id="main-view" style="display:flex; flex-direction:column; height:100%;">
    <div class="header" id="main-header">
      <div class="app-title">Kamus <span>Bahasa Indonesia</span></div>
      <div class="search-bar" id="search-bar">
        <span style="font-size:16px; color:var(--text3);">🔍</span>
        <input type="search" id="search-input" placeholder="인도네시아어, 한국어, 영어 모두 검색..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="search-clear" id="search-clear" style="display:none;">✕</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" id="filter-starts">시작하는 단어</button>
        <button class="filter-btn" id="filter-contains">포함된 단어</button>
      </div>
    </div>
    <div class="content-area" id="main-content"></div>
    <nav class="nav-bar">
      <button class="nav-item active" data-tab="search" onclick="switchTab('search')"><span class="nav-icon">🔍</span>검색</button>
      <button class="nav-item" data-tab="favorites" onclick="switchTab('favorites')"><span class="nav-icon">★</span>즐겨찾기</button>
      <button class="nav-item" data-tab="wordbook" onclick="switchTab('wordbook')"><span class="nav-icon">📖</span>단어장</button>
      <button class="nav-item" data-tab="settings" onclick="switchTab('settings')"><span class="nav-icon">⚙</span>설정</button>
    </nav>
  </div>

  <!-- ── DETAIL VIEW ── -->
  <div id="detail-view">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">‹</button>
      <div class="detail-header-title" id="detail-title"></div>
      <button class="star-btn" id="detail-star" onclick="toggleFavDetail()"></button>
    </div>
    <div class="detail-content" id="detail-content"></div>
  </div>

  <!-- ── EDIT VIEW ── -->
  <div id="edit-view">
    <div class="detail-header">
      <button class="back-btn" onclick="closeEdit()">✕</button>
      <div class="detail-header-title" id="edit-title">단어 추가</div>
    </div>
    <div class="form-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">인도네시아어 *</label>
        <input class="form-input" id="edit-ind" placeholder="예: belajar" autocorrect="off" autocapitalize="off">
      </div>
      <div class="form-group">
        <label class="form-label">한국어 *</label>
        <input class="form-input" id="edit-ko" placeholder="예: 배우다, 공부하다">
      </div>
      <div class="form-group">
        <label class="form-label">영어</label>
        <input class="form-input" id="edit-en" placeholder="예: to study, to learn" autocorrect="off" autocapitalize="off">
      </div>
      <div class="form-group">
        <label class="form-label">어근</label>
        <input class="form-input" id="edit-root" placeholder="예: ajar" autocorrect="off" autocapitalize="off">
      </div>
      <button class="form-submit" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──
let DB = null;
let DICT = [];       // [[ind, ko, en, root], ...]  기본 데이터 (인덱스 = id, id<0이면 커스텀)
let favorites = new Set();
let recentSearches = [];
let customWords = [];  // {id, ind, ko, en, root}
let wordbooks = [];    // {id, name, wordIds:[]}
let currentTab = 'search';
let filterMode = 'starts'; // 'starts' | 'contains'
let currentDetail = null;
let editingCustomId = null;
let wordbookTab = 'list'; // 'list' | 'words'
let activeWordbookId = null;

// ── IndexedDB ──
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('KamusDeh', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta');
      if (!db.objectStoreNames.contains('custom')) db.createObjectStore('custom', {keyPath:'id', autoIncrement:true});
      if (!db.objectStoreNames.contains('wordbooks')) db.createObjectStore('wordbooks', {keyPath:'id', autoIncrement:true});
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}

function dbGet(store, key) {
  return new Promise(res => {
    const tx = DB.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => res(null);
  });
}
function dbPut(store, key, val) {
  return new Promise(res => {
    const tx = DB.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val, key);
    req.onsuccess = () => res();
  });
}
function dbGetAll(store) {
  return new Promise(res => {
    const tx = DB.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result || []);
  });
}
function dbAdd(store, val) {
  return new Promise(res => {
    const tx = DB.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(val);
    req.onsuccess = () => res(req.result);
  });
}
function dbDelete(store, key) {
  return new Promise(res => {
    const tx = DB.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => res();
  });
}
function dbPutRecord(store, val) {
  return new Promise(res => {
    const tx = DB.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = () => res(req.result);
  });
}

async function loadState() {
  favorites = new Set((await dbGet('meta','favorites')) || []);
  recentSearches = (await dbGet('meta','recent')) || [];
  customWords = await dbGetAll('custom');
  wordbooks = await dbGetAll('wordbooks');
}
async function saveFavorites() { await dbPut('meta','favorites',[...favorites]); }
async function saveRecent() { await dbPut('meta','recent', recentSearches); }

// ── Load dict ──
async function loadDict() {
  const res = await fetch('dict_data.json');
  DICT = await res.json();
}

// ── Search ──
function getQuery() { return document.getElementById('search-input').value.trim().toLowerCase(); }

function search(q) {
  if (!q) return null;
  const starts = filterMode === 'starts';
  const results = { id:[], ko:[], en:[] };
  const qLower = q.toLowerCase();

  const allWords = [
    ...DICT.map((d,i) => ({idx:i, ind:d[0], ko:d[1], en:d[2], root:d[3], custom:false})),
    ...customWords.map(c => ({idx:'c'+c.id, ind:c.ind||'', ko:c.ko||'', en:c.en||'', root:c.root||'', custom:true}))
  ];

  for (const w of allWords) {
    const ind = w.ind.toLowerCase();
    const ko = w.ko.toLowerCase();
    const en = w.en.toLowerCase();
    if (starts) {
      if (ind.startsWith(qLower)) results.id.push(w);
      else if (ko.startsWith(qLower)) results.ko.push(w);
      else if (en.startsWith(qLower)) results.en.push(w);
    } else {
      if (ind.includes(qLower)) results.id.push(w);
      else if (ko.includes(qLower)) results.ko.push(w);
      else if (en.includes(qLower)) results.en.push(w);
    }
  }
  return results;
}

function hl(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0,idx) + '<span class="highlight">' + text.slice(idx, idx+q.length) + '</span>' + text.slice(idx+q.length);
}

function wordId(w) { return w.custom ? 'c'+w.idx.toString().replace('c','') : w.idx; }

function isFav(w) {
  return favorites.has(w.custom ? 'c'+w.idx.toString().replace('c','') : w.idx);
}

function renderCard(w, q) {
  const fav = isFav(w);
  const id = wordId(w);
  const badge = w.custom ? '<span class="src-badge src-custom">나의 단어</span>' : '';
  return `<div class="word-card" onclick="openDetail('${id}')">
    <div class="card-top">
      <div class="card-main">
        ${badge}
        <div class="word-ind">${q ? hl(w.ind, q) : w.ind}</div>
        <div class="word-ko">${q ? hl(w.ko, q) : w.ko}</div>
        ${w.en ? `<div class="word-en">${w.en}</div>` : ''}
      </div>
      <button class="star-btn" onclick="event.stopPropagation(); toggleFav('${id}')">${fav ? '★' : '☆'}</button>
    </div>
  </div>`;
}

function renderMain() {
  const q = getQuery();
  const el = document.getElementById('main-content');

  if (currentTab === 'search') {
    if (!q) {
      let html = '';
      if (recentSearches.length) {
        html += '<div class="section-label">최근 검색</div>';
        for (const id of recentSearches.slice(0,10)) {
          const w = getWord(id);
          if (w) html += renderCard(w, '');
        }
      } else {
        html += '<div class="empty-msg">검색어를 입력하세요<br><span style="font-size:12px;">인도네시아어, 한국어, 영어 모두 검색 가능</span></div>';
      }
      html += `<div class="section-label">전체 단어 ${DICT.length + customWords.length}개</div>`;
      el.innerHTML = html;
      return;
    }
    const res = search(q);
    if (!res) return;
    let html = '';
    const groups = [
      {key:'id', label:'인도네시아어'},
      {key:'ko', label:'한국어'},
      {key:'en', label:'영어'}
    ];
    let total = 0;
    for (const g of groups) {
      const arr = res[g.key];
      total += arr.length;
      if (arr.length === 0) continue;
      html += `<div class="group-label">${g.label} · ${arr.length}개</div>`;
      for (const w of arr.slice(0,50)) html += renderCard(w, q);
      if (arr.length > 50) html += `<div class="empty-msg" style="padding:10px 20px; font-size:12px;">... 외 ${arr.length-50}개</div>`;
    }
    if (total === 0) html = `<div class="empty-msg">"${q}"에 해당하는 단어가 없어요</div>`;
    el.innerHTML = html;

  } else if (currentTab === 'favorites') {
    if (favorites.size === 0) {
      el.innerHTML = '<div class="empty-msg">즐겨찾기한 단어가 없어요<br><span style="font-size:12px;">단어 옆 ☆를 눌러 저장하세요</span></div>';
      return;
    }
    let html = `<div class="section-label">즐겨찾기 · ${favorites.size}개</div>`;
    for (const id of favorites) {
      const w = getWord(id);
      if (w) html += renderCard(w, '');
    }
    el.innerHTML = html;

  } else if (currentTab === 'wordbook') {
    renderWordbook(el);

  } else if (currentTab === 'settings') {
    renderSettings(el);
  }
}

function renderWordbook(el) {
  let html = `<div class="section-label">단어장 · ${wordbooks.length}개</div>`;
  for (const wb of wordbooks) {
    html += `<div class="wordbook-card" onclick="openWordbook(${wb.id})">
      <div class="wordbook-icon">📖</div>
      <div class="wordbook-info">
        <div class="wordbook-name">${wb.name}</div>
        <div class="wordbook-count">단어 ${(wb.wordIds||[]).length}개</div>
      </div>
      <span style="color:var(--text3); font-size:20px;">›</span>
    </div>`;
  }
  html += `<div class="add-wordbook-btn" onclick="addWordbook()">+ 새 단어장 만들기</div>`;
  el.innerHTML = html;
}

function renderSettings(el) {
  el.innerHTML = `
    <div class="settings-title">데이터</div>
    <div class="settings-card settings-section">
      <div class="settings-row" onclick="exportData()">
        <span class="settings-icon">📤</span>
        <span class="settings-label">JSON으로 내보내기</span>
        <span class="settings-arrow">›</span>
      </div>
      <div class="settings-row" onclick="importData()">
        <span class="settings-icon">📥</span>
        <span class="settings-label">JSON으로 가져오기</span>
        <span class="settings-arrow">›</span>
      </div>
    </div>
    <div class="settings-title">단어</div>
    <div class="settings-card settings-section">
      <div class="settings-row" onclick="openAdd()">
        <span class="settings-icon">➕</span>
        <span class="settings-label">새 단어 추가</span>
        <span class="settings-arrow">›</span>
      </div>
    </div>
    <div class="settings-section" style="text-align:center; padding-top:8px;">
      <div style="font-size:12px; color:var(--text3); line-height:1.8;">
        Kamus Bahasa Indonesia<br>기본 단어 ${DICT.length}개 · 나의 단어 ${customWords.length}개<br>
        즐겨찾기 ${favorites.size}개 · 단어장 ${wordbooks.length}개
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
  `;
}

// ── Word lookup ──
function getWord(id) {
  if (typeof id === 'string' && id.startsWith('c')) {
    const cid = parseInt(id.slice(1));
    const c = customWords.find(w => w.id === cid);
    if (!c) return null;
    return {idx:'c'+cid, ind:c.ind, ko:c.ko, en:c.en, root:c.root, custom:true};
  }
  const i = parseInt(id);
  if (i < 0 || i >= DICT.length) return null;
  const d = DICT[i];
  return {idx:i, ind:d[0], ko:d[1], en:d[2], root:d[3], custom:false};
}

// ── Detail ──
function openDetail(id) {
  const w = getWord(id);
  if (!w) return;
  currentDetail = w;
  addRecent(id);

  document.getElementById('main-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'flex';

  document.getElementById('detail-title').textContent = w.ind;
  document.getElementById('detail-star').textContent = isFav(w) ? '★' : '☆';
  document.getElementById('detail-star').style.color = isFav(w) ? 'var(--red)' : 'var(--text3)';

  const fav = isFav(w);
  const wbOptions = wordbooks.map(wb => {
    const has = (wb.wordIds||[]).includes(String(id));
    return `<option value="${wb.id}" ${has?'selected':''}>${wb.name}</option>`;
  }).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-card">
      ${w.custom ? '<span class="src-badge src-custom">나의 단어</span>' : ''}
      <div class="detail-word">${w.ind}</div>
      ${w.root && w.root !== w.ind ? `<div class="detail-root">어근: ${w.root}</div>` : ''}
      <div class="detail-divider"></div>
      <div class="detail-ko">${w.ko}</div>
      ${w.en ? `<div class="detail-en">${w.en}</div>` : ''}
      <div class="detail-actions">
        <div class="action-btn primary" onclick="openWordbookModal('${id}')">단어장 추가</div>
        <div class="action-btn" onclick="openEditFromDetail()">수정</div>
        ${w.custom ? `<div class="action-btn danger" onclick="deleteCustomWord('${id}')">삭제</div>` : ''}
      </div>
    </div>
  `;
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('main-view').style.display = 'flex';
  renderMain();
}

function toggleFavDetail() {
  if (!currentDetail) return;
  const id = wordId(currentDetail);
  if (favorites.has(id)) { favorites.delete(id); } else { favorites.add(id); }
  saveFavorites();
  const fav = isFav(currentDetail);
  document.getElementById('detail-star').textContent = fav ? '★' : '☆';
  document.getElementById('detail-star').style.color = fav ? 'var(--red)' : 'var(--text3)';
  showToast(fav ? '즐겨찾기에 추가했어요' : '즐겨찾기에서 제거했어요');
}

// ── Favorites toggle ──
async function toggleFav(id) {
  if (favorites.has(id)) { favorites.delete(id); showToast('즐겨찾기에서 제거했어요'); }
  else { favorites.add(id); showToast('즐겨찾기에 추가했어요'); }
  await saveFavorites();
  renderMain();
}

// ── Recent ──
async function addRecent(id) {
  recentSearches = recentSearches.filter(r => r !== id);
  recentSearches.unshift(id);
  if (recentSearches.length > 20) recentSearches = recentSearches.slice(0,20);
  await saveRecent();
}

// ── Edit/Add ──
function openAdd() {
  editingCustomId = null;
  document.getElementById('edit-title').textContent = '새 단어 추가';
  document.getElementById('edit-id').value = '';
  document.getElementById('edit-ind').value = '';
  document.getElementById('edit-ko').value = '';
  document.getElementById('edit-en').value = '';
  document.getElementById('edit-root').value = '';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('edit-view').style.display = 'flex';
}

function openEditFromDetail() {
  if (!currentDetail) return;
  editingCustomId = currentDetail.custom ? parseInt(currentDetail.idx.toString().replace('c','')) : null;
  document.getElementById('edit-title').textContent = currentDetail.custom ? '단어 수정' : '단어 수정 (사본 저장)';
  document.getElementById('edit-ind').value = currentDetail.ind;
  document.getElementById('edit-ko').value = currentDetail.ko;
  document.getElementById('edit-en').value = currentDetail.en;
  document.getElementById('edit-root').value = currentDetail.root;
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('edit-view').style.display = 'flex';
}

function closeEdit() {
  document.getElementById('edit-view').style.display = 'none';
  if (currentDetail) {
    document.getElementById('detail-view').style.display = 'flex';
  } else {
    document.getElementById('main-view').style.display = 'flex';
    renderMain();
  }
}

async function saveEdit() {
  const ind = document.getElementById('edit-ind').value.trim();
  const ko = document.getElementById('edit-ko').value.trim();
  const en = document.getElementById('edit-en').value.trim();
  const root = document.getElementById('edit-root').value.trim();
  if (!ind || !ko) { showToast('인도네시아어와 한국어는 필수입니다'); return; }

  if (editingCustomId !== null) {
    const w = customWords.find(w => w.id === editingCustomId);
    if (w) { w.ind = ind; w.ko = ko; w.en = en; w.root = root; await dbPutRecord('custom', w); }
  } else {
    const newId = await dbAdd('custom', {ind, ko, en, root});
    customWords = await dbGetAll('custom');
    editingCustomId = newId;
  }
  customWords = await dbGetAll('custom');
  showToast('저장했어요');
  closeEdit();
}

// ── Delete custom word ──
async function deleteCustomWord(id) {
  if (!confirm('이 단어를 삭제할까요?')) return;
  const cid = parseInt(id.toString().replace('c',''));
  await dbDelete('custom', cid);
  customWords = await dbGetAll('custom');
  favorites.delete(id);
  await saveFavorites();
  showToast('삭제했어요');
  closeDetail();
}

// ── Wordbook ──
function addWordbook() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-sheet">
    <div class="modal-title">새 단어장</div>
    <input class="modal-input" id="wb-name-input" placeholder="단어장 이름" autofocus>
    <div class="modal-actions">
      <button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">취소</button>
      <button class="modal-btn primary" onclick="createWordbook()">만들기</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('wb-name-input')?.focus(), 100);
}

async function createWordbook() {
  const name = document.getElementById('wb-name-input')?.value.trim();
  if (!name) return;
  await dbAdd('wordbooks', {name, wordIds:[]});
  wordbooks = await dbGetAll('wordbooks');
  document.querySelector('.modal-overlay')?.remove();
  renderMain();
  showToast('단어장을 만들었어요');
}

function openWordbook(id) {
  const wb = wordbooks.find(w => w.id === id);
  if (!wb) return;
  const el = document.getElementById('main-content');
  let html = `<div style="display:flex; align-items:center; gap:8px; padding:12px 16px 4px;">
    <button onclick="renderMain()" style="background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;">‹ 뒤로</button>
    <div style="font-size:16px;font-weight:500;flex:1;">${wb.name}</div>
    <button onclick="deleteWordbook(${id})" style="background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;">삭제</button>
  </div>`;
  if (!wb.wordIds || wb.wordIds.length === 0) {
    html += '<div class="empty-msg">단어장이 비어있어요<br><span style="font-size:12px;">단어 상세에서 추가하세요</span></div>';
  } else {
    html += `<div class="section-label">단어 ${wb.wordIds.length}개</div>`;
    for (const wid of wb.wordIds) {
      const w = getWord(wid);
      if (w) html += renderCard(w, '');
    }
  }
  el.innerHTML = html;
}

function openWordbookModal(wordId) {
  if (wordbooks.length === 0) {
    showToast('단어장을 먼저 만들어주세요');
    return;
  }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  let opts = wordbooks.map(wb => {
    const has = (wb.wordIds||[]).includes(String(wordId));
    return `<div class="settings-row" onclick="toggleWordbookWord(${wb.id},'${wordId}',this)" style="cursor:pointer;">
      <span class="settings-icon">${has ? '✅' : '⬜'}</span>
      <span class="settings-label">${wb.name}</span>
    </div>`;
  }).join('');
  overlay.innerHTML = `<div class="modal-sheet">
    <div class="modal-title">단어장에 추가</div>
    <div class="settings-card">${opts}</div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="modal-btn primary" onclick="this.closest('.modal-overlay').remove()">완료</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

async function toggleWordbookWord(wbId, wordId, el) {
  const wb = wordbooks.find(w => w.id === wbId);
  if (!wb) return;
  wb.wordIds = wb.wordIds || [];
  const sid = String(wordId);
  const icon = el.querySelector('.settings-icon');
  if (wb.wordIds.includes(sid)) {
    wb.wordIds = wb.wordIds.filter(i => i !== sid);
    icon.textContent = '⬜';
  } else {
    wb.wordIds.push(sid);
    icon.textContent = '✅';
  }
  await dbPutRecord('wordbooks', wb);
  wordbooks = await dbGetAll('wordbooks');
}

async function deleteWordbook(id) {
  if (!confirm('단어장을 삭제할까요?')) return;
  await dbDelete('wordbooks', id);
  wordbooks = await dbGetAll('wordbooks');
  renderMain();
  showToast('단어장을 삭제했어요');
}

// ── Export / Import ──
async function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    favorites: [...favorites],
    customWords,
    wordbooks
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kamusdeh_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 파일을 저장했어요');
}

function importData() {
  document.getElementById('import-file')?.click();
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.version) throw new Error('invalid');
    if (!confirm('기존 즐겨찾기, 나의 단어, 단어장을 불러온 데이터로 교체할까요?')) return;

    // favorites
    if (data.favorites) {
      favorites = new Set(data.favorites);
      await saveFavorites();
    }
    // customWords
    if (data.customWords) {
      const tx = DB.transaction('custom', 'readwrite');
      tx.objectStore('custom').clear();
      await new Promise(r => { tx.oncomplete = r; });
      for (const w of data.customWords) {
        await dbAdd('custom', {ind:w.ind, ko:w.ko, en:w.en, root:w.root});
      }
      customWords = await dbGetAll('custom');
    }
    // wordbooks
    if (data.wordbooks) {
      const tx = DB.transaction('wordbooks', 'readwrite');
      tx.objectStore('wordbooks').clear();
      await new Promise(r => { tx.oncomplete = r; });
      for (const wb of data.wordbooks) {
        await dbAdd('wordbooks', {name:wb.name, wordIds:wb.wordIds||[]});
      }
      wordbooks = await dbGetAll('wordbooks');
    }
    renderMain();
    showToast('데이터를 불러왔어요');
  } catch {
    showToast('올바른 백업 파일이 아닙니다');
  }
  e.target.value = '';
}

// ── Tab ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  const header = document.getElementById('main-header');
  const searchBar = document.getElementById('search-input').parentElement;
  if (tab === 'search') {
    header.style.display = '';
  } else {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').style.display = 'none';
  }
  renderMain();
}

// ── Filter ──
document.getElementById('filter-starts').addEventListener('click', () => {
  filterMode = 'starts';
  document.getElementById('filter-starts').classList.add('active');
  document.getElementById('filter-contains').classList.remove('active');
  renderMain();
});
document.getElementById('filter-contains').addEventListener('click', () => {
  filterMode = 'contains';
  document.getElementById('filter-contains').classList.add('active');
  document.getElementById('filter-starts').classList.remove('active');
  renderMain();
});

// ── Search input ──
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value;
  document.getElementById('search-clear').style.display = q ? '' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderMain, 150);
});
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderMain();
});
document.getElementById('search-bar').addEventListener('focusin', () => {
  document.getElementById('search-bar').classList.add('focused');
});
document.getElementById('search-bar').addEventListener('focusout', () => {
  document.getElementById('search-bar').classList.remove('focused');
});

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Init ──
async function init() {
  document.getElementById('main-content').innerHTML = '<div class="empty-msg">사전 데이터 로딩 중...</div>';
  DB = await openDB();
  await Promise.all([loadDict(), loadState()]);
  renderMain();
}

init();
</script>
